<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <title>가계부</title>
  </head>
  <body>
    <header>
      <button type="button" id="refresh-icon">
        <img src="./images/sopt.png" alt="sopt" />
      </button>
      <p class="title">Lee Hyeon Jong</p>
      <p class="text">SOPT 38th WEB</p>
    </header>
    <main id="main">
      <section id="filter">
        <h3>검색 필터</h3>
        <form id="filter-form" class="filter-grid">
          <div class="filter-item">
            <label for="title">제목</label>
            <input id="title" name="title" placeholder="내역을 입력하세요" />
          </div>
          <div class="filter-item">
            <label for="type">유형</label>
            <select name="type" id="type">
              <option value="all">전체</option>
              <option value="income">수입</option>
              <option value="expense">지출</option>
            </select>
          </div>
          <div class="filter-item">
            <label for="category">카테고리</label>
            <select name="category" id="category">
              <option value="all">전체</option>
              <option value="식비">식비</option>
              <option value="교통">교통</option>
              <option value="생활">생활</option>
              <option value="문화">문화</option>
              <option value="월급">월급</option>
              <option value="기타">기타</option>
            </select>
          </div>
          <div class="filter-item">
            <label for="pay">결제수단</label>
            <select name="pay" id="pay">
              <option value="all">전체</option>
              <option value="신용카드">신용카드</option>
              <option value="체크카드">체크카드</option>
              <option value="현금">현금</option>
              <option value="기타">기타</option>
            </select>
          </div>
          <button
            type="submit"
            id="filter-apply-button"
            class="filter-item btn-primary"
          >
            적용
          </button>
          <button
            type="reset"
            id="filter-reset-button"
            class="filter-item btn-primary"
          >
            초기화
          </button>
        </form>
      </section>
      <section id="table">
        <div class="table-header">
          <div class="table-buttons">
            <button type="button" id="delete-btn" class="btn-primary">
              선택 삭제
            </button>
            <button type="button" id="add-btn" class="btn-primary">추가</button>
          </div>
        </div>
        <table id="budget-table">
          <thead>
            <tr>
              <th scope="col"></th>
              <th scope="col">제목</th>
              <th scope="col">금액</th>
              <th scope="col">날짜</th>
              <th scope="col">카테고리</th>
              <th scope="col">결제수단</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
          <tfoot>
            <tr id="total-row">
              <td colspan="2">total</td>
              <td id="total-amount"></td>
              <td colspan="3"></td>
            </tr>
          </tfoot>
        </table>
      </section>
    </main>
    <div
      id="modal"
      class="modal-overlay hidden"
      role="dialog"
      aria-modal="true"
    >
      <div class="modal-box">
        <div class="modal-header">
          <h3>항목 추가</h3>
          <button type="button" id="modal-close">✕</button>
        </div>
        <form id="modal-form" class="modal-body">
          <div class="modal-item">
            <label for="modal-title">제목</label>
            <input id="modal-title" placeholder="제목을 입력하세요" />
          </div>
          <div class="modal-item">
            <label for="modal-type">유형</label>
            <select id="modal-type">
              <option value="">선택</option>
              <option value="income">수입</option>
              <option value="expense">지출</option>
            </select>
          </div>
          <div class="modal-item">
            <label for="modal-amount">금액</label>
            <input
              id="modal-amount"
              type="number"
              placeholder="금액을 입력하세요"
            />
          </div>
          <div class="modal-item">
            <label for="modal-date">날짜</label>
            <input id="modal-date" type="date" />
          </div>
          <div class="modal-item">
            <label for="modal-category">카테고리</label>
            <select id="modal-category">
              <option value="">선택</option>
              <option value="식비">식비</option>
              <option value="교통">교통</option>
              <option value="생활">생활</option>
              <option value="문화">문화</option>
              <option value="월급">월급</option>
              <option value="기타">기타</option>
            </select>
          </div>
          <div class="modal-item">
            <label for="modal-pay">결제수단</label>
            <select id="modal-pay">
              <option value="">선택</option>
              <option value="신용카드">신용카드</option>
              <option value="체크카드">체크카드</option>
              <option value="현금">현금</option>
              <option value="기타">기타</option>
            </select>
          </div>
          <button type="submit" id="modal-add" class="btn-primary">추가</button>
        </form>
      </div>
    </div>
    <script type="module" src="index.js"></script>
  </body>
</html>
