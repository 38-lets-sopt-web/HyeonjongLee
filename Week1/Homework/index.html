<!doctype html>
<html lang="en">
  <head>
    <title>My Blog</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header id="header">
      <img src="images/profile.jpeg" alt="profile" />
      <div class="title">Lee Hyeon Jong</div>
      <a href="https://github.com/Navi-Up">
        <img src="images/github.png" alt="social icon"
      /></a>
    </header>
    <div id="content">
      <nav id="nav">
        <ul>
          <li><a href="#photo">포토덤프</a></li>
          <li><a href="#like">좋아하는 것</a></li>
          <li><a href="#hobby">내 관심사</a></li>
          <li><a href="#say">To. 웹왔니</a></li>
        </ul>
      </nav>
      <main id="main">
        <section id="photo">
          <h3>포토덤프</h3>
          <div class="photo-grid">
            <div class="photo-item"><img src="images/photodump1.jpeg" /></div>
            <div class="photo-item"><img src="images/photodump2.jpeg" /></div>
            <div class="photo-item"><img src="images/photodump3.jpeg" /></div>
            <div class="photo-item"><img src="images/photodump4.jpeg" /></div>
            <div class="photo-item"><img src="images/photodump5.jpeg" /></div>
            <div class="photo-item"><img src="images/photodump6.jpeg" /></div>
          </div>
        </section>
        <section id="like">
          <h3>좋아하는 것: 짱구</h3>
          <div class="like-scroll">
            <img src="images/shinchan1.png" alt="shinchan" />
            <img src="images/shinchan2.png" alt="shinchan" />
            <img src="images/shinchan3.png" alt="shinchan" />
            <img src="images/shinchan4.png" alt="shinchan" />
            <img src="images/shinchan5.png" alt="shinchan" />
            <img src="images/shinchan6.png" alt="shinchan" />
            <img src="images/shinchan7.png" alt="shinchan" />
            <img src="images/shinchan8.png" alt="shinchan" />
            <img src="images/shinchan9.png" alt="shinchan" />
          </div>
        </section>
        <section id="hobby">
          <h3>내 관심사</h3>
          <div class="hobby-grid">
            <div class="hobby-card">
              <img src="images/chicken.png" alt="chicken" />
              <p class="card-title">치킨</p>
              <div class="card-buttons">
                <button class="btn-like">좋아요</button>
                <button class="btn-dislike">싫어요</button>
              </div>
            </div>
            <div class="hobby-card">
              <img src="images/hamburger.png" alt="hamburger" />
              <p class="card-title">햄버거</p>
              <div class="card-buttons">
                <button class="btn-like">좋아요</button>
                <button class="btn-dislike">싫어요</button>
              </div>
            </div>
            <div class="hobby-card">
              <img src="images/cat.png" alt="cat" />
              <p class="card-title">고양이</p>
              <div class="card-buttons">
                <button class="btn-like">좋아요</button>
                <button class="btn-dislike">싫어요</button>
              </div>
            </div>
            <div class="hobby-card">
              <img src="images/dog.png" alt="dog" />
              <p class="card-title">강아지</p>
              <div class="card-buttons">
                <button class="btn-like">좋아요</button>
                <button class="btn-dislike">싫어요</button>
              </div>
            </div>
            <div class="hobby-card">
              <img src="images/fox.png" alt="fox" />
              <p class="card-title">여우</p>
              <div class="card-buttons">
                <button class="btn-like">좋아요</button>
                <button class="btn-dislike">싫어요</button>
              </div>
            </div>
            <div class="hobby-card">
              <img src="images/pizza.png" alt="pizza" />
              <p class="card-title">피자</p>
              <div class="card-buttons">
                <button class="btn-like">좋아요</button>
                <button class="btn-dislike">싫어요</button>
              </div>
            </div>
            <div class="hobby-card">
              <img src="images/ddukbokki.png" alt="ddukbokki" />
              <p class="card-title">떡볶이</p>
              <div class="card-buttons">
                <button class="btn-like">좋아요</button>
                <button class="btn-dislike">싫어요</button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
